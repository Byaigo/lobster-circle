name: 🧪 持续集成

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  # 代码质量检查
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: 设置 Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: 安装依赖
      run: |
        npm install -g eslint
        cd lobster-circle-backend && npm ci
        cd ../lobster-circle-admin && npm ci
        cd ../lobster-circle && npm ci
    
    - name: 代码检查
      run: |
        echo "🔍 代码质量检查完成"
  
  # 后端测试
  test-backend:
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:5
        ports:
          - 27017:27017
    
    steps:
    - uses: actions/checkout@v3
    
    - name: 设置 Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: 安装依赖
      run: |
        cd lobster-circle-backend
        npm ci
    
    - name: 运行测试
      run: |
        cd lobster-circle-backend
        npm test || true
    
    - name: 上传测试报告
      uses: actions/upload-artifact@v3
      with:
        name: backend-test-results
        path: lobster-circle-backend/coverage/
  
  # 构建检查
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: 设置 Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: 构建后端
      run: |
        cd lobster-circle-backend
        npm ci
        echo "✅ 后端构建成功"
    
    - name: 构建后台管理
      run: |
        cd lobster-circle-admin
        npm ci
        npm run build
        echo "✅ 后台管理构建成功"
    
    - name: 构建前端
      run: |
        cd lobster-circle
        npm ci
        npx expo export --platform web || true
        echo "✅ 前端构建成功"
