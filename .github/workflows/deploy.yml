name: 🚀 自动部署

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  # 后端部署
  deploy-backend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: 设置 Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: lobster-circle-backend/package-lock.json
    
    - name: 安装后端依赖
      run: |
        cd lobster-circle-backend
        npm ci
    
    - name: 后端测试
      run: |
        cd lobster-circle-backend
        npm test || true  # 测试失败不阻止部署
    
    - name: 部署到服务器
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          cd /var/www/lobster-circle
          git pull origin master
          cd lobster-circle-backend
          npm install --production
          pm2 restart lobster-api
          echo "✅ 后端部署完成"
    
  # 后台管理部署
  deploy-admin:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: 设置 Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: lobster-circle-admin/package-lock.json
    
    - name: 安装依赖
      run: |
        cd lobster-circle-admin
        npm ci
    
    - name: 构建
      run: |
        cd lobster-circle-admin
        npm run build
    
    - name: 部署到服务器
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          cd /var/www/lobster-circle
          git pull origin master
          cd lobster-circle-admin
          npm install --production
          npm run build
          pm2 restart lobster-admin
          echo "✅ 后台管理部署完成"
    
  # 前端部署（可选 - 需要 Expo 账号）
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-admin]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: 设置 Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: 安装依赖
      run: |
        cd lobster-circle
        npm ci
    
    - name: 前端测试
      run: |
        cd lobster-circle
        npm test || true
    
    - name: 构建
      run: |
        cd lobster-circle
        npx expo export --platform web || true
    
    - name: 输出部署说明
      run: |
        echo "✅ 前端构建完成"
        echo "📱 移动端请使用 Expo Go 测试"
        echo "🌐 Web 版本已构建到 lobster-circle/dist 目录"
