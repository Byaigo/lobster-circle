version: '3.8'

services:
  # MongoDB 数据库
  mongodb:
    image: mongo:6.0
    container_name: lobster-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: lobster123
      MONGO_INITDB_DATABASE: lobster-circle
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - lobster-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端 API 服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lobster-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://admin:lobster123@mongodb:27017/lobster-circle?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-key}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    ports:
      - "3000:3000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - lobster-network
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npm run init && npm start"

  # Nginx 反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: lobster-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - lobster-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  lobster-network:
    driver: bridge
